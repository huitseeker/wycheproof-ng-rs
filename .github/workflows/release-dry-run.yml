name: release dry run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Cargo.toml
      - crates/**
      - scripts/**
      - .github/workflows/**

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  release-dry-run:
    name: verify release artifacts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Verify vectors offline
        run: scripts/verify-wycheproof-data-offline.sh

      - name: Verify vectors against pinned upstream
        run: scripts/verify-wycheproof-data.sh

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- --deny warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Docs
        run: cargo doc --workspace --no-deps

      - name: Minimal downstream imports
        run: scripts/verify-minimal-imports.sh

      - name: Package size budget
        run: scripts/verify-package-sizes.sh

      - name: Verify package artifacts
        run: scripts/publish-workspace.sh --dry-run

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crates
          path: target/package/*.crate
